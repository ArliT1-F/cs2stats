  <body style="background:#0a0e1a;color:#e2e8f0;font-family:system-ui,sans-serif;margin:0;">
    <!-- Pre-React diagnostic shell. If JS never runs, the user sees a clear
         message instead of a blank page. If JS errors before React mounts,
         the inline error handler below captures it and renders the message
         right here in plain DOM (no React needed). -->
    <div id="root">
      <div id="boot-status" style="padding:24px;font-family:ui-monospace,Menlo,monospace;color:#94a3b8;font-size:13px;line-height:1.6;">
        <div style="color:#f59e0b;font-weight:bold;letter-spacing:.1em;">// CS2 TRACKER</div>
        <div style="margin-top:8px;">Loading application…</div>
        <noscript>
          <div style="margin-top:16px;padding:12px;border:1px solid #ef4444;color:#ef4444;">
            JavaScript is required to run this application.
          </div>
        </noscript>
      </div>
    </div>

    <!-- Pre-React error capture. Catches anything that crashes before React
         even has a chance to mount (script parse errors, top-level throws,
         module load failures). On mobile, where the dev console isn't easily
         accessible, this is the only way to see what went wrong. -->
    <script>
      (function () {
        var boot = document.getElementById("boot-status");
        function showError(label, info) {
          if (!boot) return;
          boot.innerHTML =
            '<div style="padding:24px;font-family:ui-monospace,Menlo,monospace;color:#e2e8f0;font-size:13px;line-height:1.5;">' +
            '<div style="color:#ef4444;font-weight:bold;letter-spacing:.1em;">// PRE-REACT ERROR — ' + label + '</div>' +
            '<div style="margin-top:12px;padding:12px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.08);color:#fca5a5;word-break:break-word;white-space:pre-wrap;">' +
            info +
            '</div>' +
            '<div style="margin-top:16px;color:#64748b;">Reload the page or screenshot this and report it.</div>' +
            '</div>';
        }
        window.addEventListener("error", function (e) {
          var msg = (e && (e.message || (e.error && e.error.message))) || "Unknown error";
          var src = (e && e.filename) ? "\\nat " + e.filename + ":" + e.lineno + ":" + e.colno : "";
          var stk = (e && e.error && e.error.stack) ? "\\n\\n" + e.error.stack : "";
          showError("script error", msg + src + stk);
        });
        window.addEventListener("unhandledrejection", function (e) {
          var reason = e && e.reason;
          var msg = reason && (reason.message || String(reason)) || "Unknown rejection";
          var stk = reason && reason.stack ? "\\n\\n" + reason.stack : "";
          showError("unhandled promise rejection", msg + stk);
        });
        // If the React mount never replaces #boot-status within 8s, surface it.
        setTimeout(function () {
          if (boot && boot.parentNode && document.getElementById("boot-status")) {
            boot.innerHTML =
              '<div style="padding:24px;font-family:ui-monospace,Menlo,monospace;color:#e2e8f0;font-size:13px;line-height:1.5;">' +
              '<div style="color:#f59e0b;font-weight:bold;letter-spacing:.1em;">// STILL LOADING…</div>' +
              '<div style="margin-top:12px;color:#94a3b8;">React has not mounted after 8 seconds. ' +
              'This usually means the JS bundle failed to load or parse. ' +
              'Try a hard refresh (pull down on the page).</div>' +
              '<div style="margin-top:12px;color:#64748b;font-size:11px;">' +
              'UA: ' + navigator.userAgent +
              '</div>' +
              '</div>';
          }
        }, 8000);
      })();
    </script>


    <!-- Fallback for browsers that don't support type=module (very rare in 2026,
         but iOS Safari < 11 and IE will hit this). They get a clear message
         instead of a blank screen. -->
    <script nomodule>
      var b = document.getElementById("boot-status");
      if (b) {
        b.innerHTML =
          '<div style="padding:24px;font-family:ui-monospace,Menlo,monospace;color:#e2e8f0;font-size:13px;line-height:1.5;">' +
          '<div style="color:#ef4444;font-weight:bold;letter-spacing:.1em;">// BROWSER TOO OLD</div>' +
          '<div style="margin-top:12px;padding:12px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.08);color:#fca5a5;">' +
          'Your browser does not support modern JavaScript modules. ' +
          'Please update to a recent version of Safari, Chrome, Firefox, or Edge.' +
          '</div>' +
          '</div>';
      }
    </script>
  </body>
